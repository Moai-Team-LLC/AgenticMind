name: ✨ Feature request
description: Propose a capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that AgenticMind doesn't (or doesn't cleanly) support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should it do? If it touches the MCP tool surface, note the contract impact.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      options:
        - label: This keeps AgenticMind a focused knowledge & memory substrate (not an agent framework)
          required: false
