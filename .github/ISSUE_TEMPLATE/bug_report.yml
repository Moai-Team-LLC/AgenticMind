name: 🐛 Bug report
description: Something doesn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please don't include secrets, tokens, or private corpus content.
        For security issues, use private reporting instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Call the `kl_ask_global` tool with ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: AgenticMind version/commit, Bun version, Postgres version, OS, embed/chat provider.
      placeholder: "v0.2.0 · Bun 1.3.x · Postgres 17 · macOS · EMBED_PROVIDER=local"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / trace
      description: Relevant server/worker logs or the why-trace (redact anything sensitive).
      render: shell
