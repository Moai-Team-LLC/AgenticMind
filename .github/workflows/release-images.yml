name: release-images

# Publish multi-arch (linux/amd64 + linux/arm64) AgenticMind server + worker
# images to GHCR so self-hosters can `docker pull` instead of clone-and-build —
# and run them unchanged on Apple Silicon dev machines and arm64 cloud
# (Graviton/Ampere) without a --platform flag:
#   ghcr.io/moai-team-llc/agenticmind-server:<version>   (and :latest)
#   ghcr.io/moai-team-llc/agenticmind-worker:<version>
# Fires on each published GitHub Release; also runnable on demand.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: agenticmind-server
            dockerfile: Dockerfile.server
          - image: agenticmind-worker
            dockerfile: Dockerfile.worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
