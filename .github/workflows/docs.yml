name: docs

# Build the MkDocs Material site from docs/ and deploy to GitHub Pages.
# Python-only: no impact on the Bun monorepo or its frozen-lockfile CI.
#
# One-time setup before the deploy job can publish:
#   Repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
      - run: pip install -r docs/requirements.txt
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    # PRs validate the build only; publishing happens on main.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
